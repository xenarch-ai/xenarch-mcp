description: |
  Non-custodial x402 MCP server for AI agents. Lets Claude, Cursor, LangChain and CrewAI pay for HTTP 402–gated APIs with USDC micropayments on Base L2. Unlike Cloudflare Pay-Per-Crawl, works on any host and settles agent-to-publisher direct.
homepage: https://xenarch.com
# TODO: Smithery YAML schema does not document a top-level `tags` or `keywords` field
# (the canonical source is `smithery.json`/dashboard). Tag list lives in package.json
# keywords (§4.7) until Smithery confirms a yaml-level field exists.
startCommand:
  type: http
  configSchema:
    type: object
    required: []
    properties:
      privateKey:
        type: string
        description: "Wallet private key (hex, 0x-prefixed). Auto-generates on first run if omitted."
      rpcUrl:
        type: string
        default: "https://mainnet.base.org"
        description: "Base RPC endpoint URL"
      network:
        type: string
        enum:
          - base
          - base-sepolia
        default: "base"
        description: "Network for payments"
      autoApproveMaxUsd:
        type: number
        description: "Max USD to auto-approve without prompting"
  commandFunction: |
    (config) => ({
      command: 'node',
      args: ['packages/agent/dist/index.js', '--http'],
      env: {
        XENARCH_PRIVATE_KEY: config.privateKey || '',
        XENARCH_RPC_URL: config.rpcUrl || 'https://mainnet.base.org',
        XENARCH_NETWORK: config.network || 'base',
        XENARCH_AUTO_APPROVE_MAX: config.autoApproveMaxUsd ? String(config.autoApproveMaxUsd) : '',
        PORT: '{{port}}'
      }
    })
